<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NK Brother's Travels | Ticket Manager</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* --- ENHANCED COLORFUL PRINT STYLES --- */
        @media print {
            .no-print { display: none !important; }
            .print-show { display: block !important; }
            body { background-color: white; padding: 0; }
            
            .print-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            .print-table th, .print-table td { border: 1px solid #cbd5e1; padding: 12px; font-size: 12px; text-align: left; }
            
            /* Colorful Header */
            .print-table th { 
                background-color: #4f46e5 !important; 
                color: white !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                font-weight: 700;
                text-transform: uppercase;
            }
            
            /* Alternating Row Colors */
            .print-table tr:nth-child(even) td { 
                background-color: #f8fafc !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            
            /* Highlighted Totals Footer */
            .print-table tfoot td { 
                background-color: #e0e7ff !important; 
                color: #312e81 !important; 
                font-weight: 800; 
                border-top: 2px solid #4f46e5 !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            
            .print-card { box-shadow: none !important; border: none !important; break-inside: avoid; margin: 0; background: white !important; }
            @page { size: landscape; margin: 1cm; }
        }
    </style>
</head>
<body class="text-slate-900">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Icons ---
        const Icons = {
            Layout: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
            Plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            List: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Directory: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            FileText: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Printer: () => <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
            Alert: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        };

        const getInitialForm = () => {
            const today = new Date();
            const localDate = new Date(today.getTime() - today.getTimezoneOffset() * 60000).toISOString().split('T')[0];
            return {
                id: '', date: localDate, operator: '', bus: '', bookedBy: '',
                from: '', to: '', seatCount: '', rate: '', amount: 0,
                commissionPercent: '10', customCommission: '', commissionAmount: 0, finalAmount: 0
            };
        };

        const FormGroup = ({ label, children, fullWidth = false }) => (
            <div className={`flex flex-col gap-1.5 ${fullWidth ? 'md:col-span-2' : 'md:col-span-1'}`}>
                <label className="text-sm font-medium text-slate-700">{label}</label>
                {children}
            </div>
        );

        const NavItem = ({ id, label, icon: Icon, activeTab, onClick }) => (
            <button 
                onClick={() => onClick(id)}
                className={`flex flex-col items-center justify-center min-w-[70px] flex-1 md:flex-none py-3 md:py-3 md:px-4 md:w-full md:flex-row md:justify-start md:gap-3 rounded-lg transition-all text-sm font-medium ${activeTab === id ? 'text-indigo-700 bg-indigo-50/80 shadow-sm' : 'text-slate-500 hover:text-slate-900 hover:bg-slate-100'}`}
            >
                <Icon />
                <span className="text-[10px] md:text-sm mt-1 md:mt-0">{label}</span>
            </button>
        );

        const inputClass = "w-full px-3 py-2.5 bg-white border border-slate-300 rounded-lg text-sm shadow-sm placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all";

        const App = () => {
            const [bookings, setBookings] = useState(() => JSON.parse(localStorage.getItem('ticketBookings_v4') || '[]'));
            const [staff, setStaff] = useState(() => JSON.parse(localStorage.getItem('ticketStaff_v4') || '[]'));
            const [operators, setOperators] = useState(() => JSON.parse(localStorage.getItem('ticketOperators_v4') || '[]'));
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [formData, setFormData] = useState(getInitialForm());
            const [isEditing, setIsEditing] = useState(false);
            
            const [newStaffName, setNewStaffName] = useState('');
            const [newOperatorName, setNewOperatorName] = useState('');

            useEffect(() => {
                localStorage.setItem('ticketBookings_v4', JSON.stringify(bookings));
                localStorage.setItem('ticketStaff_v4', JSON.stringify(staff));
                localStorage.setItem('ticketOperators_v4', JSON.stringify(operators));
            }, [bookings, staff, operators]);

            const totals = useMemo(() => {
                return bookings.reduce((acc, curr) => {
                    acc.seats += parseFloat(curr.seatCount) || 0;
                    acc.collection += parseFloat(curr.amount) || 0;
                    acc.commission += parseFloat(curr.commissionAmount) || 0;
                    acc.final += parseFloat(curr.finalAmount) || 0;
                    return acc;
                }, { count: bookings.length, seats: 0, collection: 0, commission: 0, final: 0 });
            }, [bookings]);

            const handleFormChange = (e) => {
                const { name, value } = e.target;
                let newData = { ...formData, [name]: value };

                const seats = parseFloat(newData.seatCount) || 0;
                const rate = parseFloat(newData.rate) || 0;
                const amount = seats * rate;

                let commPercent = newData.commissionPercent === 'custom' 
                    ? parseFloat(newData.customCommission) || 0 
                    : parseFloat(newData.commissionPercent) || 0;

                const commAmount = (amount * commPercent) / 100;
                setFormData({ ...newData, amount, commissionAmount: commAmount, finalAmount: amount - commAmount });
            };

            const saveBooking = (e) => {
                e.preventDefault();
                if(!formData.bookedBy) return alert("Please select Staff.");
                if(!formData.operator) return alert("Please select an Operator.");
                
                if (isEditing) {
                    setBookings(bookings.map(b => b.id === formData.id ? formData : b));
                    setIsEditing(false);
                } else {
                    setBookings([{ ...formData, id: Date.now().toString() }, ...bookings]);
                }
                setFormData(getInitialForm());
                setActiveTab('list');
            };

            const resetSystemData = () => {
                const confirm1 = window.confirm("WARNING: This will permanently delete all records, staff, and operators. Proceed?");
                if(confirm1) {
                    const confirm2 = window.prompt("Type 'DELETE' to confirm data reset.");
                    if(confirm2 === 'DELETE') {
                        setBookings([]); setStaff([]); setOperators([]);
                        localStorage.clear();
                        setActiveTab('dashboard');
                        alert("All data wiped successfully.");
                    }
                }
            };

            const handleNavClick = (id) => {
                setActiveTab(id);
                setIsEditing(false);
                setFormData(getInitialForm());
            };

            return (
                <div className="flex flex-col md:flex-row min-h-screen">
                    
                    {/* Header Mobile */}
                    <div className="md:hidden bg-white border-b border-slate-200 p-4 shadow-sm no-print flex justify-between items-center z-10 sticky top-0">
                        <div className="font-bold text-lg text-slate-900 flex items-center gap-2">
                            <div className="w-6 h-6 bg-indigo-600 rounded flex items-center justify-center text-white"><Icons.Layout /></div>
                            NK Brother's<span className="text-indigo-600 font-normal">Travels</span>
                        </div>
                    </div>

                    {/* Sidebar / Bottom Nav */}
                    <nav className="fixed bottom-0 w-full bg-white border-t border-slate-200 flex md:relative md:w-64 md:flex-col md:border-t-0 md:border-r md:h-screen no-print z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] md:shadow-none">
                        <div className="hidden md:flex p-6 border-b border-slate-200 items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg shadow-sm flex items-center justify-center text-white"><Icons.Layout /></div>
                            <div className="font-bold text-xl text-slate-900 tracking-tight leading-tight">NK Brother's<br/><span className="text-indigo-600 font-normal text-lg">Travels</span></div>
                        </div>
                        <div className="flex w-full md:flex-col p-2 gap-1 overflow-x-auto whitespace-nowrap">
                            <NavItem id="dashboard" label="Home" icon={Icons.Layout} activeTab={activeTab} onClick={handleNavClick} />
                            <NavItem id="add" label="Book Ticket" icon={Icons.Plus} activeTab={activeTab} onClick={handleNavClick} />
                            <NavItem id="list" label="Records" icon={Icons.List} activeTab={activeTab} onClick={handleNavClick} />
                            <NavItem id="directory" label="Directory" icon={Icons.Directory} activeTab={activeTab} onClick={handleNavClick} />
                            <NavItem id="reports" label="Reports" icon={Icons.FileText} activeTab={activeTab} onClick={handleNavClick} />
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-1 p-4 md:p-8 mb-20 md:mb-0 overflow-y-auto w-full bg-slate-50/50">
                        
                        {/* --- TAB: DASHBOARD --- */}
                        {activeTab === 'dashboard' && (
                            <div className="max-w-6xl mx-auto space-y-6">
                                <h1 className="text-2xl font-bold text-slate-900 no-print">Overview Dashboard</h1>
                                
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                                    <div className="p-5 md:p-6 rounded-2xl shadow-lg bg-gradient-to-br from-blue-500 to-indigo-600 text-white flex flex-col justify-center transform hover:-translate-y-1 transition-transform">
                                        <p className="text-xs md:text-sm font-medium text-white/80 mb-1 truncate">Total Collection</p>
                                        <h3 className="text-xl md:text-3xl font-bold truncate">₹{totals.collection.toFixed(2)}</h3>
                                    </div>
                                    <div className="p-5 md:p-6 rounded-2xl shadow-lg bg-gradient-to-br from-emerald-400 to-emerald-600 text-white flex flex-col justify-center transform hover:-translate-y-1 transition-transform">
                                        <p className="text-xs md:text-sm font-medium text-white/80 mb-1 truncate">Total Commission</p>
                                        <h3 className="text-xl md:text-3xl font-bold truncate">₹{totals.commission.toFixed(2)}</h3>
                                    </div>
                                    <div className="p-5 md:p-6 rounded-2xl shadow-lg bg-gradient-to-br from-amber-400 to-orange-500 text-white flex flex-col justify-center transform hover:-translate-y-1 transition-transform">
                                        <p className="text-xs md:text-sm font-medium text-white/80 mb-1 truncate">Total Seats</p>
                                        <h3 className="text-xl md:text-3xl font-bold truncate">{totals.seats}</h3>
                                    </div>
                                    <div className="p-5 md:p-6 rounded-2xl shadow-lg bg-gradient-to-br from-fuchsia-500 to-pink-600 text-white flex flex-col justify-center transform hover:-translate-y-1 transition-transform">
                                        <p className="text-xs md:text-sm font-medium text-white/80 mb-1 truncate">Total Bookings</p>
                                        <h3 className="text-xl md:text-3xl font-bold truncate">{totals.count}</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- TAB: BOOK TICKET --- */}
                        {activeTab === 'add' && (
                            <div className="max-w-4xl mx-auto">
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8">
                                    <div className="mb-8 border-b border-slate-100 pb-4">
                                        <h1 className="text-2xl font-semibold text-slate-900">{isEditing ? 'Edit Ticket' : 'Create New Ticket'}</h1>
                                        <p className="text-sm text-slate-500 mt-1">Fill in the details below to generate a new booking record.</p>
                                    </div>
                                    
                                    <form onSubmit={saveBooking} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
                                            
                                            <FormGroup label="Booking Date">
                                                <input type="date" name="date" required value={formData.date} onChange={handleFormChange} className={inputClass} />
                                            </FormGroup>

                                            <FormGroup label="Booked By (Staff)">
                                                {staff.length === 0 ? (
                                                    <div className="px-3 py-2.5 bg-amber-50 text-amber-700 rounded-lg border border-amber-200 text-sm flex justify-between items-center">
                                                        <span>No staff available.</span>
                                                        <button type="button" onClick={()=>setActiveTab('directory')} className="font-semibold underline">Add Staff</button>
                                                    </div>
                                                ) : (
                                                    <select name="bookedBy" required value={formData.bookedBy} onChange={handleFormChange} className={inputClass}>
                                                        <option value="">Select Staff...</option>
                                                        {staff.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
                                                    </select>
                                                )}
                                            </FormGroup>

                                            <FormGroup label="Operator Name">
                                                {operators.length === 0 ? (
                                                    <div className="px-3 py-2.5 bg-amber-50 text-amber-700 rounded-lg border border-amber-200 text-sm flex justify-between items-center">
                                                        <span>No operators found.</span>
                                                        <button type="button" onClick={()=>setActiveTab('directory')} className="font-semibold underline">Add Operator</button>
                                                    </div>
                                                ) : (
                                                    <select name="operator" required value={formData.operator} onChange={handleFormChange} className={inputClass}>
                                                        <option value="">Select Operator...</option>
                                                        {operators.map(o => <option key={o.id} value={o.name}>{o.name}</option>)}
                                                    </select>
                                                )}
                                            </FormGroup>

                                            <FormGroup label="Bus Description">
                                                <input type="text" name="bus" required value={formData.bus} onChange={handleFormChange} placeholder="e.g. AC Semi-Sleeper" className={inputClass} />
                                            </FormGroup>

                                            <FormGroup label="Route: Origin">
                                                <input type="text" name="from" required value={formData.from} onChange={handleFormChange} placeholder="City From" className={inputClass} />
                                            </FormGroup>

                                            <FormGroup label="Route: Destination">
                                                <input type="text" name="to" required value={formData.to} onChange={handleFormChange} placeholder="City To" className={inputClass} />
                                            </FormGroup>

                                            <FormGroup label="Number of Seats">
                                                <input type="number" name="seatCount" required min="1" value={formData.seatCount} onChange={handleFormChange} placeholder="0" className={inputClass} />
                                            </FormGroup>

                                            <FormGroup label="Rate Per Seat (₹)">
                                                <input type="number" name="rate" required min="0" value={formData.rate} onChange={handleFormChange} placeholder="0.00" className={inputClass} />
                                            </FormGroup>

                                            <FormGroup fullWidth={true}>
                                                <div className="flex items-center justify-between p-4 bg-slate-50 border border-slate-200 rounded-lg">
                                                    <span className="text-sm font-medium text-slate-600 truncate mr-2">Gross Amount</span>
                                                    <span className="text-xl font-bold text-slate-900 truncate">₹{formData.amount.toFixed(2)}</span>
                                                </div>
                                            </FormGroup>

                                            <FormGroup label="Commission Structure">
                                                <select name="commissionPercent" value={formData.commissionPercent} onChange={handleFormChange} className={inputClass}>
                                                    <option value="10">10% Standard</option>
                                                    <option value="15">15% Elevated</option>
                                                    <option value="20">20% Premium</option>
                                                    <option value="custom">Custom Rate</option>
                                                </select>
                                            </FormGroup>
                                            
                                            {formData.commissionPercent === 'custom' && (
                                                <FormGroup label="Custom Commission (%)">
                                                    <input type="number" name="customCommission" required min="0" step="0.1" value={formData.customCommission} onChange={handleFormChange} placeholder="e.g. 12.5" className={inputClass} />
                                                </FormGroup>
                                            )}
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                                            <div className="p-4 bg-emerald-50 rounded-lg border border-emerald-100 flex flex-col justify-center">
                                                <span className="text-[10px] md:text-xs font-semibold text-emerald-600 uppercase tracking-wider mb-1 truncate">Commission Earned</span>
                                                <span className="text-xl md:text-2xl font-bold text-emerald-700 truncate">₹{formData.commissionAmount.toFixed(2)}</span>
                                            </div>
                                            <div className="p-4 bg-indigo-50 rounded-lg border border-indigo-100 flex flex-col justify-center">
                                                <span className="text-[10px] md:text-xs font-semibold text-indigo-600 uppercase tracking-wider mb-1 truncate">Payable to Operator</span>
                                                <span className="text-xl md:text-2xl font-bold text-indigo-700 truncate">₹{formData.finalAmount.toFixed(2)}</span>
                                            </div>
                                        </div>

                                        <div className="pt-4 flex justify-end">
                                            <button type="submit" className="w-full md:w-auto px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                                                {isEditing ? 'Save Changes' : 'Create Record'}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* --- TAB: DIRECTORY --- */}
                        {activeTab === 'directory' && (
                            <div className="max-w-5xl mx-auto space-y-6">
                                <h1 className="text-2xl font-bold text-slate-900 no-print">Directory Management</h1>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col h-full">
                                        <h2 className="text-lg font-semibold text-slate-900 mb-1">Staff Roster</h2>
                                        <p className="text-sm text-slate-500 mb-6">Manage agents who book tickets.</p>
                                        
                                        <form onSubmit={(e) => { e.preventDefault(); if(newStaffName.trim()) { setStaff([...staff, {id: Date.now().toString(), name: newStaffName.trim()}]); setNewStaffName(''); } }} className="flex gap-2 mb-6">
                                            <input type="text" value={newStaffName} onChange={e => setNewStaffName(e.target.value)} placeholder="Enter staff name..." className={inputClass} />
                                            <button type="submit" className="px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white text-sm font-medium rounded-lg transition-colors whitespace-nowrap">Add Staff</button>
                                        </form>

                                        <div className="flex-1 overflow-y-auto max-h-[400px] border border-slate-100 rounded-lg bg-slate-50 p-2 space-y-2">
                                            {staff.length === 0 ? <p className="text-sm text-slate-400 text-center py-4">No staff records.</p> : null}
                                            {staff.map(s => (
                                                <div key={s.id} className="flex justify-between items-center p-3 bg-white border border-slate-200 rounded-md shadow-sm">
                                                    <span className="text-sm font-medium text-slate-700">{s.name}</span>
                                                    <button onClick={() => { if(window.confirm("Remove?")) setStaff(staff.filter(i => i.id !== s.id)); }} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded transition-colors"><Icons.Trash /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col h-full">
                                        <h2 className="text-lg font-semibold text-slate-900 mb-1">Bus Operators</h2>
                                        <p className="text-sm text-slate-500 mb-6">Manage travel agencies and bus companies.</p>
                                        
                                        <form onSubmit={(e) => { e.preventDefault(); if(newOperatorName.trim()) { setOperators([...operators, {id: Date.now().toString(), name: newOperatorName.trim()}]); setNewOperatorName(''); } }} className="flex gap-2 mb-6">
                                            <input type="text" value={newOperatorName} onChange={e => setNewOperatorName(e.target.value)} placeholder="Enter operator name..." className={inputClass} />
                                            <button type="submit" className="px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white text-sm font-medium rounded-lg transition-colors whitespace-nowrap">Add Operator</button>
                                        </form>

                                        <div className="flex-1 overflow-y-auto max-h-[400px] border border-slate-100 rounded-lg bg-slate-50 p-2 space-y-2">
                                            {operators.length === 0 ? <p className="text-sm text-slate-400 text-center py-4">No operator records.</p> : null}
                                            {operators.map(o => (
                                                <div key={o.id} className="flex justify-between items-center p-3 bg-white border border-slate-200 rounded-md shadow-sm">
                                                    <span className="text-sm font-medium text-slate-700">{o.name}</span>
                                                    <button onClick={() => { if(window.confirm("Remove?")) setOperators(operators.filter(i => i.id !== o.id)); }} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded transition-colors"><Icons.Trash /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Danger Zone */}
                                <div className="mt-8 p-6 bg-red-50 border border-red-200 rounded-xl no-print">
                                    <div className="flex items-center gap-2 mb-2">
                                        <div className="text-red-600"><Icons.Alert /></div>
                                        <h3 className="text-lg font-bold text-red-900">Danger Zone</h3>
                                    </div>
                                    <p className="text-sm text-red-700 mb-4">Resetting the system will permanently delete all local storage data. You cannot undo this action.</p>
                                    <button onClick={resetSystemData} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-medium text-sm rounded-lg shadow-sm transition-colors">
                                        Factory Reset System
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* --- TAB: RECORDS TABLE --- */}
                        {activeTab === 'list' && (
                            <div className="max-w-full mx-auto space-y-4">
                                
                                {/* HIDDEN BRANDING: Only shows when printing the records */}
                                <div className="hidden print-show text-center mb-6 pb-4 border-b border-slate-200">
                                    <h2 className="text-2xl font-extrabold text-slate-900 uppercase tracking-widest">NK Brother's Travels</h2>
                                    <h3 className="text-lg font-bold text-slate-700 mt-1">Booking Statement</h3>
                                    <p className="text-sm font-medium text-slate-600 mt-1">Contact Bilal - +91 90258 83756</p>
                                </div>

                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center no-print gap-4 mb-4">
                                    <h1 className="text-2xl font-bold text-slate-900">Ticket Records</h1>
                                    <button onClick={() => window.print()} className="inline-flex items-center px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 shadow-sm transition-colors">
                                        <Icons.Printer /> Print Colorful PDF
                                    </button>
                                </div>
                                
                                {bookings.length === 0 ? (
                                    <div className="text-center py-16 bg-white rounded-xl border border-dashed border-slate-300">
                                        <p className="text-slate-500 text-sm">No records found. Generate a booking to see it here.</p>
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print-card">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm print-table min-w-[800px]">
                                                <thead className="bg-slate-50 border-b border-slate-200">
                                                    <tr>
                                                        <th className="px-4 py-3 font-medium text-slate-500">Date</th>
                                                        <th className="px-4 py-3 font-medium text-slate-500">Operator & Bus</th>
                                                        <th className="px-4 py-3 font-medium text-slate-500">Staff</th>
                                                        <th className="px-4 py-3 font-medium text-slate-500">Route</th>
                                                        <th className="px-4 py-3 font-medium text-slate-500 text-center">Seats</th>
                                                        <th className="px-4 py-3 font-medium text-slate-500 text-right">Amount</th>
                                                        <th className="px-4 py-3 font-medium text-slate-500 text-right">Comm.</th>
                                                        <th className="px-4 py-3 font-medium text-slate-500 text-right">Payable</th>
                                                        <th className="px-4 py-3 font-medium text-slate-500 text-center no-print">Actions</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {bookings.map(b => (
                                                        <tr key={b.id} className="hover:bg-slate-50/50 transition-colors">
                                                            <td className="px-4 py-3 whitespace-nowrap text-slate-600">{b.date}</td>
                                                            <td className="px-4 py-3">
                                                                <div className="font-medium text-slate-900">{b.operator}</div>
                                                                <div className="text-xs text-slate-500">{b.bus}</div>
                                                            </td>
                                                            <td className="px-4 py-3">
                                                                <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-700 border border-slate-200">{b.bookedBy}</span>
                                                            </td>
                                                            <td className="px-4 py-3 whitespace-nowrap text-slate-600">{b.from} &rarr; {b.to}</td>
                                                            <td className="px-4 py-3 text-center font-medium text-slate-700">{b.seatCount}</td>
                                                            <td className="px-4 py-3 text-right text-slate-600">₹{b.amount.toFixed(2)}</td>
                                                            <td className="px-4 py-3 text-right">
                                                                <div className="font-medium text-emerald-600">₹{b.commissionAmount.toFixed(2)}</div>
                                                                <div className="text-[10px] text-slate-400">({b.commissionPercent === 'custom' ? b.customCommission : b.commissionPercent}%)</div>
                                                            </td>
                                                            <td className="px-4 py-3 text-right font-semibold text-slate-900">₹{b.finalAmount.toFixed(2)}</td>
                                                            <td className="px-4 py-3 text-center no-print whitespace-nowrap space-x-2">
                                                                <button onClick={() => { setFormData(b); setIsEditing(true); setActiveTab('add'); }} className="text-indigo-600 hover:text-indigo-800 text-sm font-medium">Edit</button>
                                                                <button onClick={() => { if(window.confirm("Delete booking?")) setBookings(bookings.filter(x => x.id !== b.id)); }} className="text-red-500 hover:text-red-700 text-sm font-medium">Del</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                                <tfoot className="bg-slate-100 border-t-2 border-slate-300 font-bold text-slate-900">
                                                    <tr>
                                                        <td colSpan="4" className="px-4 py-4 text-right uppercase tracking-wider text-xs">Grand Totals:</td>
                                                        <td className="px-4 py-4 text-center">{totals.seats}</td>
                                                        <td className="px-4 py-4 text-right">₹{totals.collection.toFixed(2)}</td>
                                                        <td className="px-4 py-4 text-right text-emerald-700">₹{totals.commission.toFixed(2)}</td>
                                                        <td className="px-4 py-4 text-right text-indigo-700">₹{totals.final.toFixed(2)}</td>
                                                        <td className="px-4 py-4 no-print"></td>
                                                    </tr>
                                                </tfoot>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* --- TAB: REPORTS --- */}
                        {activeTab === 'reports' && (
                            <div className="max-w-4xl mx-auto space-y-6">
                                <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-slate-200 print-card">
                                    
                                    {/* BRANDING HEADER */}
                                    <div className="text-center mb-8 border-b border-slate-200 pb-6">
                                        <h2 className="text-2xl md:text-3xl font-extrabold text-slate-900 uppercase tracking-widest truncate">NK Brother's Travels</h2>
                                        <h3 className="text-lg md:text-xl font-bold text-slate-700 mt-1 truncate">Booking Statement</h3>
                                        <p className="text-xs md:text-sm font-medium text-slate-600 mt-2 truncate">Contact Bilal - +91 90258 83756</p>
                                    </div>

                                    <div className="flex justify-end no-print mb-6">
                                        <button onClick={() => window.print()} className="inline-flex items-center px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium shadow-sm transition-colors">
                                            <Icons.Printer /> Print Colorful PDF
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-8">
                                        <div className="p-3 md:p-4 bg-slate-50 rounded-lg border border-slate-100 text-center">
                                            <p className="text-[10px] md:text-xs font-medium text-slate-500 uppercase tracking-wider truncate">Bookings</p>
                                            <p className="text-lg md:text-2xl font-bold text-slate-900 mt-1 truncate">{totals.count}</p>
                                        </div>
                                        <div className="p-3 md:p-4 bg-slate-50 rounded-lg border border-slate-100 text-center">
                                            <p className="text-[10px] md:text-xs font-medium text-slate-500 uppercase tracking-wider truncate">Total Seats</p>
                                            <p className="text-lg md:text-2xl font-bold text-slate-900 mt-1 truncate">{totals.seats}</p>
                                        </div>
                                        <div className="p-3 md:p-4 bg-slate-50 rounded-lg border border-slate-100 text-center">
                                            <p className="text-[10px] md:text-xs font-medium text-slate-500 uppercase tracking-wider truncate">Gross Income</p>
                                            <p className="text-lg md:text-2xl font-bold text-slate-900 mt-1 truncate">₹{totals.collection.toFixed(2)}</p>
                                        </div>
                                        <div className="p-3 md:p-4 bg-emerald-50 rounded-lg border border-emerald-100 text-center">
                                            <p className="text-[10px] md:text-xs font-medium text-emerald-600 uppercase tracking-wider truncate">Net Commission</p>
                                            <p className="text-lg md:text-2xl font-bold text-emerald-700 mt-1 truncate">₹{totals.commission.toFixed(2)}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-slate-900 p-5 md:p-8 rounded-xl text-center shadow-md">
                                        <p className="text-xs md:text-sm font-medium text-slate-400 uppercase tracking-wider mb-2 truncate">Total Payable to Operators</p>
                                        <p className="text-3xl md:text-5xl font-black text-white truncate">₹{totals.final.toFixed(2)}</p>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
